---
- name: Bienvenidos a lab con ansible
  hosts: local
  vars:
    ambiente: dev
  tasks:
    - name: Imprimir mensaje
      ansible.builtin.debug:
        msg: "Hola desde Ansible! Host {{ inventory_hostname }}"
    
    - name: Crear un archivo con mi nombre
      ansible.builtin.file:
        path: ./saludo.txt
        state: touch
    
    - name: Escribir mi nombre en el file
      ansible.builtin.copy:
        content: "Ansible funcionando mi nombre es Walter Leturia y estoy en {{ ambiente }}"
        dest: ./saludo.txt

    - name: Escribir mi nombre en el file 2
      ansible.builtin.copy:
        content: "Ansible funcionando mi nombre es Walter Leturia y estoy en {{ ambiente }}"
        dest: ./saludo.txt

